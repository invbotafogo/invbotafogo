<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body { background-color: #14110e; }
        html.preload-lock body { visibility: hidden; }
        html.preload-lock body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: #14110e;
            z-index: 2147483647;
            visibility: visible;
        }
    </style>
    <script>
        document.documentElement.classList.add('preload-lock');
        window.addEventListener('load', function () {
            document.documentElement.classList.remove('preload-lock');
        });
    </script>
    <title>INVB - Cultos</title>
    <!-- Favicon padrão -->
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/logo2.png">
    <link rel="icon" type="image/png" sizes="48x48" href="../assets/images/logo2.png">
    <link rel="icon" type="image/png" sizes="96x96" href="../assets/images/logo2.png">

    <!-- Para Android -->
    <link rel="icon" type="image/png" sizes="192x192" href="../assets/images/logo2.png">

    <!-- Para iOS (atalhos na tela inicial) -->
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/logo2.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <div id="header"></div> <!-- Header será injetado aqui -->

    <div class="section-cultos">
        <!-- Próximo culto dinâmico -->
        <div id="proximo-culto" class="proximo-culto"></div>

        <!-- Últimos cultos (acima do calendário; área centralizada no CSS) -->
        <section id="ultimos-cultos" class="ultimos-cultos">
            <h2>Últimos Cultos</h2>
            <div id="videos" class="videos-container"></div>
        </section>

        <section class="section-cultos-unificada">
            <div class="cultos-eventos-container">
                <div class="eventos-box">
                    <div class="eventos-header">
                        <h2><i class="fa-solid fa-calendar-days"></i> Calendário de Eventos</h2>
                        <p class="eventos-subtitulo">Programe-se para estar conosco nos próximos eventos.</p>
                        <p class="eventos-subtitulo">Um lugar para você crescer, servir e pertencer.</p>
                    </div>
                    <div id="calendar-container"></div>
                </div>
            </div>
        </section>

        <div id="footer"></div> <!-- Footer será injetado aqui -->
</body>

</html>
