<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body { background-color: #14110e; }
        html.preload-lock body { visibility: hidden; }
        html.preload-lock body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: #14110e;
            z-index: 2147483647;
            visibility: visible;
        }
    </style>
    <script>
        document.documentElement.classList.add('preload-lock');
        window.addEventListener('load', function () {
            document.documentElement.classList.remove('preload-lock');
        });
    </script>
    <title>INVB - Igreja de Nova Vida Botafogo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
</head>

        Sobre

</body>

</html>
