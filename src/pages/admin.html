<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin — INVB</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- <link rel="stylesheet" href="../css/loumi.css"> -->

    <style>
     /* =============================================
   ADMIN.CSS — Painel de Gestão INVB
   Extraído do loumi.css
   ============================================= */

@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap');

/* ─── VARIÁVEIS ─── */
:root {
  --cor-fundo:          #0d0d0d;
  --cor-fundo-card:     #1a1a1a;
  --cor-fundo-card2:    #222222;
  --cor-primaria:       #b8973a;
  --cor-primaria-hover: #d4af52;
  --cor-texto:          #e8e8e8;
  --cor-texto-suave:    #aaaaaa;
  --cor-borda:          #333333;
  --cor-destaque:       #8b0000;
  --cor-sucesso:        #2e7d32;
  --cor-erro:           #c62828;
  --radius:             8px;
  --sombra:             0 4px 20px rgba(0,0,0,0.5);

  /* Admin */
  --bg-card:      #1a1a1a;
  --bg-input:     #252525;
  --accent-color: #ffd700;
}

/* ─── RESET ─── */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Lato', sans-serif;
  background-color: var(--cor-fundo);
  color: var(--cor-texto);
  min-height: 100vh;
  line-height: 1.6;
}

/* ─── FUNDO DA PÁGINA ─── */
.admin-body {
  background: var(--cor-fundo);
  padding: 20px;
}

/* ─── CONTAINER CENTRAL ─── */
.admin-container {
  max-width: 600px;
  margin: auto;
}

/* ══════════════════════════════════════════════
   BOTÕES GLOBAIS
══════════════════════════════════════════════ */
.btn-entrar {
  width: 100%;
  padding: 13px;
  background: var(--cor-primaria);
  color: #0d0d0d;
  border: none;
  border-radius: var(--radius);
  font-family: 'Cinzel', serif;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}

.btn-entrar:hover  { background: var(--cor-primaria-hover); transform: translateY(-1px); }
.btn-entrar:active { transform: translateY(0); }

/* Botão salvar — espaçamento no form admin */
#form-admin .btn-entrar {
  margin-top: 20px;
}

.btn-sair {
  background: transparent;
  border: 1px solid #444;
  color: var(--cor-texto-suave);
  padding: 6px 14px;
  border-radius: var(--radius);
  font-family: 'Lato', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  white-space: nowrap;
}

.btn-sair:hover {
  border-color: var(--cor-primaria);
  color: var(--cor-primaria);
}

/* Botão voltar — largura total no form admin */
#form-admin .btn-sair {
  width: 100%;
  margin-top: 10px;
}

/* ══════════════════════════════════════════════
   ADMIN — LAYOUT
══════════════════════════════════════════════ */
.admin-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  padding: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.card-admin {
  background: var(--bg-card);
  border: 1px solid var(--cor-borda);
  border-radius: 12px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* ─── ADMIN HEADER ─── */
.admin-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  border-bottom: 1px solid #333;
  padding-bottom: 15px;
  gap: 12px;
  flex-wrap: wrap;
}

.admin-header h2 {
  color: var(--accent-color);
  margin: 0;
  font-size: 1.2rem;
}

.mes-seletor-container { text-align: right; }

.mes-seletor-container label {
  display: block;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.6;
  margin-bottom: 4px;
}

#adm-mes-seletor {
  background: var(--bg-input);
  color: var(--accent-color);
  border: 1px solid var(--accent-color);
  padding: 6px 10px;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  font-size: 0.85rem;
}

/* ─── BADGE MINISTÉRIO FIXO ─── */
.badge-ministerio {
  display: inline-block;
  background: rgba(255,215,0,0.12);
  color: var(--accent-color);
  border: 1px solid rgba(255,215,0,0.35);
  border-radius: 6px;
  padding: 10px 16px;
  font-size: 0.95rem;
  font-weight: bold;
  letter-spacing: 0.5px;
  width: 100%;
  box-sizing: border-box;
  text-align: center;
}

/* ─── INPUTS ─── */
.input-estilo {
  width: 100%;
  height: 46px;
  background-color: var(--bg-input) !important;
  color: white !important;
  border: 1px solid var(--cor-borda);
  border-radius: 8px;
  padding: 0 15px;
  font-size: 0.9rem;
  outline: none;
  box-sizing: border-box;
  appearance: none;
  -webkit-appearance: none;
  font-family: 'Lato', sans-serif;
  transition: border-color 0.2s;
}

.input-estilo:focus { border-color: var(--accent-color); }

input::-webkit-calendar-picker-indicator {
  filter: invert(1);
  opacity: 0.3;
  margin-right: 5px;
}

/* ─── LABELS DO FORM ─── */
#form-admin label {
  display: block;
  text-align: left;
  font-size: 0.78rem;
  color: var(--cor-texto-suave);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ─── BOTÃO DELETE ─── */
.btn-delete {
  background: rgba(255,77,77,0.13);
  color: #ff4d4d;
  border: 1px solid #ff4d4d;
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
  transition: background 0.2s, color 0.2s;
  flex-shrink: 0;
}

.btn-delete:hover { background: #ff4d4d; color: white; }

/* ─── LISTA DE ESCALAS ─── */
#lista-escalas-grupos h2 {
  font-size: 1.1rem;
  border-left: 4px solid var(--accent-color);
  padding-left: 10px;
  margin-bottom: 18px;
}

/* ══════════════════════════════════════════════
   ANIMAÇÕES
══════════════════════════════════════════════ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════════════════════════
   RESPONSIVO — TABLET (≤ 900px)
══════════════════════════════════════════════ */
@media (max-width: 900px) {
  .admin-layout {
    grid-template-columns: 1fr;
    padding: 16px;
    gap: 16px;
  }
}

/* ══════════════════════════════════════════════
   RESPONSIVO — MOBILE (≤ 640px)
══════════════════════════════════════════════ */
@media (max-width: 640px) {
  .admin-header {
    flex-direction: column;
    align-items: flex-start;
  }

  .mes-seletor-container { text-align: left; width: 100%; }
  #adm-mes-seletor       { width: 100%; }

  .card-admin { padding: 18px 16px; }

  .admin-layout { padding: 12px; }
}
    </style>
</head>
<body>

    <div class="admin-layout">

        <!-- FORMULÁRIO -->
        <section>
            <div class="card-admin">
                <div class="admin-header">
                    <h2>Nova Escala</h2>
                    <div class="mes-seletor-container">
                        <label>Mês da Escala</label>
                        <select id="adm-mes-seletor"></select>
                    </div>
                </div>

                <form id="form-admin" class="login-form">

                    <label>Ministério</label>
                    <div class="badge-ministerio" id="adm-min-label">—</div>

                    <label style="margin-top: 15px;">Data e Culto</label>
                    <select id="adm-data-culto" class="input-estilo" required></select>

                    <label style="margin-top: 15px;">Função</label>
                    <select id="adm-funcao" class="input-estilo" required></select>

                    <label style="margin-top: 15px;">Nome</label>
                    <select id="adm-nome" class="input-estilo" required></select>

                    <button type="submit" class="btn-entrar" style="margin-top: 25px;">ADICIONAR À ESCALA</button>
                    <button
                        type="button"
                        class="btn-sair"
                        onclick="window.location.href='../../loumi.html?r=aW52Yg=='"
                        style="width: 100%; margin-top: 10px;"
                    >
                        Voltar ao Painel
                    </button>
                </form>
            </div>
        </section>

        <!-- LISTA -->
        <section>
            <h2 style="margin-bottom: 20px; font-size: 1.2rem; border-left: 4px solid var(--accent-color); padding-left: 10px;">Escalas Atuais</h2>
            <div id="lista-escalas-grupos"></div>
        </section>

    </div>

        <script>
                    // =============================================
            //  ADMIN.JS — Painel de Gestão INVB
            // =============================================

            // ─── VERIFICAÇÃO DE ACESSO POR TOKEN ─────────
            (function verificarToken() {
                const params = new URLSearchParams(window.location.search);
                const r = params.get('r');
                try {
                    if (atob(r || '') !== 'invb') {
                        document.body.innerHTML = '';
                        window.location.href = '/';
                    }
                } catch (_) {
                    document.body.innerHTML = '';
                    window.location.href = '/';
                }
            })();

            const _URL = 'https://qzuwwboddnpptkbtsicc.supabase.co';
            const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6dXd3Ym9kZG5wcHRrYnRzaWNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjQyMDcsImV4cCI6MjA5MjQ0MDIwN30.cycw6QQRcXMgLEJSakXapgP-mwAw4ZxrNJ6CGHhqlio';
            const supabaseAdmin = supabase.createClient(_URL, _KEY);

            let estaSalvando = false;

            // ─── MINISTÉRIO BLOQUEADO (vindo do login) ───
            // Lê o parâmetro ?ministerio=louvor da URL
            const _params           = new URLSearchParams(window.location.search);
            const MINISTERIO_FIXO   = _params.get('ministerio') || null;

            const MINISTERIOS_VALIDOS = ['louvor', 'midia', 'infantil'];

            // Se não veio parâmetro válido, manda de volta pro login
            if (!MINISTERIO_FIXO || !MINISTERIOS_VALIDOS.includes(MINISTERIO_FIXO)) {
                alert('Acesso negado. Faça login novamente.');
                window.location.href = './loumi.html?r=aW52Yg==';
            }

            // ─── FUNÇÕES POR MINISTÉRIO ──────────────────
            const FUNCOES = {
                louvor:   ['Ministrante', 'Back', 'Instrumento'],
                midia:    ['Mesa de Som', 'Transmissão', 'Slide'],
                infantil: ['Berçário', 'Maternal', 'Juniores']
            };

            const NOMES = {
                louvor: [
                    'Zema', 
                    'Leo', 
                    'Medeiros', 
                    'Matheus', 
                    'Bianca', 
                    'Anna Beatriz', 
                    'Daniela', 
                    'Raphaela', 
                    'Cris', 
                    'Mirian', 
                    'Vanessa R.', 
                    'Tiana', 
                    'Alessandro', 
                    'Pst. Humberto', 
                    'Rose', 
                    'Luciana'
                ],
                midia: [
                    'Matheus',
                    'Bianca',
                    'Jean',
                    'Alan',
                    'João', 
                    'Anna Beatriz', 
                    'Alex', 
                    'Luciana'
                ],
                infantil: [
                    'Alessandro',
                    'Bianca',
                    'Cris',
                    'Rapha',
                    'Suellen',
                    'Tiana',
                    'Vanessa R',
                    'Anna Beatriz',
                    'Alan',
                    'Luciane',
                    'Marilda',
                    'Marília',
                    'Medeiros',
                    'Vanessa H',
                    'Celiana',
                    'Ely',
                    'Francisca',
                    'Pr. Márcio'
                ]
            };

            const NOMES_MINISTERIOS = {
                louvor:   '🎵 Louvor',
                midia:    '📷 Mídia',
                infantil: '🧒 Infantil'
            };

            // ─── POPULA SELECTS FIXOS ────────────────────
            // Como o ministério é fixo, o select de ministério no HTML
            // será substituído por um campo estático/oculto.
            function popularFormulario() {
                const selFuncao = document.getElementById('adm-funcao');
                const selNome   = document.getElementById('adm-nome');
                const labelMin  = document.getElementById('adm-min-label');

                // Mostra o nome do ministério no lugar do select
                if (labelMin) labelMin.textContent = NOMES_MINISTERIOS[MINISTERIO_FIXO] || MINISTERIO_FIXO;

                // Popula funções
                const funcoes = FUNCOES[MINISTERIO_FIXO] || [];
                if (selFuncao) {
                    selFuncao.innerHTML = '<option value="">— Selecione a função —</option>' +
                        funcoes.map(f => `<option value="${f}">${f}</option>`).join('');
                }

                // Popula nomes
                const nomes = NOMES[MINISTERIO_FIXO] || [];
                if (selNome) {
                    selNome.innerHTML = '<option value="">— Selecione o nome —</option>' +
                        nomes.map(n => `<option value="${n}">${n}</option>`).join('');
                }
            }

            // ─── SELETOR DE MESES ────────────────────────
            function configurarSeletorMeses() {
                const seletor = document.getElementById('adm-mes-seletor');
                if (!seletor) return;

                const agora      = new Date();
                const mesesNomes = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

                let html = "";
                for (let i = 0; i < 2; i++) {
                    const d    = new Date(agora.getFullYear(), agora.getMonth() + i, 1);
                    const mIdx = d.getMonth();
                    const ano  = d.getFullYear();
                    html += `<option value="${mIdx}-${ano}">${mesesNomes[mIdx]} / ${ano}</option>`;
                }
                seletor.innerHTML = html;

                seletor.onchange = () => {
                    gerarDatasCultos();
                    carregarEscalas();
                };
            }

            // ─── GERA DATAS DE CULTO ─────────────────────
            function gerarDatasCultos() {
                const select     = document.getElementById('adm-data-culto');
                const seletorMes = document.getElementById('adm-mes-seletor').value;
                if (!select || !seletorMes) return;

                const [mes, ano] = seletorMes.split('-').map(Number);
                let opcoes = [];

                for (let dia = 1; dia <= 31; dia++) {
                    const d = new Date(ano, mes, dia);
                    if (d.getMonth() !== mes) break;

                    const dF      = dia < 10 ? '0' + dia : dia;
                    const mF      = (mes + 1) < 10 ? '0' + (mes + 1) : (mes + 1);
                    const dataStr = `${dF}/${mF}`;

                    if (d.getDay() === 0) {
                        opcoes.push({ val: `${dataStr}|Domingo Manhã`, text: `${dataStr} - Domingo (10h)` });
                        opcoes.push({ val: `${dataStr}|Domingo Noite`, text: `${dataStr} - Domingo (19h)` });
                    } else if (d.getDay() === 3) {
                        opcoes.push({ val: `${dataStr}|Quarta`, text: `${dataStr} - Quarta (20h)` });
                    }
                }
                select.innerHTML = opcoes.map(o => `<option value="${o.val}">${o.text}</option>`).join('');
            }

            // ─── ADICIONAR ESCALA ────────────────────────
            async function adicionarEscala(event) {
                if (event) event.preventDefault();
                if (estaSalvando) return;

                const dataCultoRaw = document.getElementById('adm-data-culto').value;
                const funcao       = document.getElementById('adm-funcao').value;
                const nome         = document.getElementById('adm-nome').value;

                if (!funcao || !nome) return alert("Preencha todos os campos.");

                estaSalvando = true;

                const [dataStr, cultoStr] = dataCultoRaw.split('|');

                const { error } = await supabaseAdmin
                    .from('escalas')
                    .insert([{ ministerio: MINISTERIO_FIXO, data: dataStr, culto: cultoStr, funcao, nome }]);

                if (error) {
                    alert("Erro ao salvar: " + error.message);
                } else {
                    document.getElementById('adm-nome').value = "";
                    carregarEscalas();
                }

                estaSalvando = false;
            }

            // ─── CARREGA LISTA ────────────────────────────
            async function carregarEscalas() {
                const container  = document.getElementById('lista-escalas-grupos');
                const seletorMes = document.getElementById('adm-mes-seletor').value;
                if (!container || !seletorMes) return;

                const [mes] = seletorMes.split('-').map(Number);
                const mesFormatado = (mes + 1).toString().padStart(2, '0');

                const { data, error } = await supabaseAdmin
                    .from('escalas')
                    .select('*')
                    .eq('ministerio', MINISTERIO_FIXO)
                    .like('data', `%/${mesFormatado}`)
                    .order('data', { ascending: true });

                if (error) return;

                const grupos = {};
                data.forEach(item => {
                    const chave = `${item.data} - ${item.culto}`;
                    if (!grupos[chave]) grupos[chave] = [];
                    grupos[chave].push(item);
                });

                container.innerHTML = Object.keys(grupos).length === 0
                    ? `<p style="text-align:center; opacity:0.5;">Nenhuma escala para este mês.</p>`
                    : Object.keys(grupos).map(titulo => `
                        <div class="card-admin" style="margin-bottom: 15px; padding: 15px; border-left: 4px solid #ffd700; background: #1e1e1e; border-radius: 8px;">
                            <h3 style="font-size: 0.9rem; margin-bottom: 12px; color: #ffd700;">📅 ${titulo}</h3>
                            ${grupos[titulo].map(i => `
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; background: #252525; padding: 8px; border-radius: 4px;">
                                    <span style="font-size: 0.85rem;"><strong>${i.funcao}:</strong> ${i.nome}</span>
                                    <button onclick="deletarRegistro(${i.id})" class="btn-delete">✕</button>
                                </div>
                            `).join('')}
                        </div>
                    `).join('');
            }

            // ─── DELETAR ─────────────────────────────────
            async function deletarRegistro(id) {
                if (!confirm("Remover este integrante?")) return;
                const { error } = await supabaseAdmin.from('escalas').delete().eq('id', id);
                if (error) alert("Erro ao deletar.");
                else carregarEscalas();
            }

            // ─── LIMPEZA AUTOMÁTICA DE ESCALAS ANTIGAS ───
            // Roda silenciosamente ao abrir o painel.
            // Deleta registros cujo MÊS/ANO é anterior ao mês atual.
            // Escalas do mês atual são sempre mantidas inteiras.
            async function limparEscalasAntigas() {
                const { data, error } = await supabaseAdmin
                    .from('escalas')
                    .select('id, data');

                if (error || !data) return;

                const agora    = new Date();
                const anoAtual = agora.getFullYear();
                const mesAtual = agora.getMonth(); // 0-based

                const idsParaDeletar = data
                    .filter(item => {
                        // data no formato "DD/MM"
                        const partes = item.data.split('/');
                        if (partes.length < 2) return false;
                        const mes = parseInt(partes[1], 10) - 1; // 0-based

                        // Se o mês do registro for maior que o atual, é do ano passado
                        const anoRegistro = mes > mesAtual ? anoAtual - 1 : anoAtual;

                        // Deleta só se o mês/ano do registro for anterior ao mês atual
                        if (anoRegistro < anoAtual) return true;
                        return anoRegistro === anoAtual && mes < mesAtual;
                    })
                    .map(item => item.id);

                if (idsParaDeletar.length === 0) return;

                await supabaseAdmin
                    .from('escalas')
                    .delete()
                    .in('id', idsParaDeletar);
            }

            // ─── INICIALIZAÇÃO ────────────────────────────
            document.addEventListener('DOMContentLoaded', async () => {
                await limparEscalasAntigas(); // roda primeiro, silenciosamente
                configurarSeletorMeses();
                gerarDatasCultos();
                popularFormulario();
                carregarEscalas();

                const form = document.getElementById('form-admin');
                if (form) form.onsubmit = adicionarEscala;
            });

            window.deletarRegistro = deletarRegistro;
    </script>
</body>
</html>
