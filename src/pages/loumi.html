<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Área Interna — INVB</title>
  <meta name="robots" content="noindex, nofollow" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="/src/css/loumi.css" />
</head>
<body>

  <!-- ─── TELA DE LOGIN ─────────────────────── -->
  <div id="tela-login">
    <div class="login-box">
      <div class="login-logo">
        <img src="/src/assets/images/logo.png" alt="Nova Vida Botafogo" class="login-logo-img" />
      </div>
      <p class="login-subtitulo">Área Interna</p>

      <div class="login-form">

        <!-- 1. Tipo de acesso -->
        <div>
          <label>Acesso</label>
          <select id="select-acesso" class="input-estilo" onchange="onAcessoChange()">
            <option value="">— Selecione —</option>
            <option value="escala">📅 Ver Escala</option>
            <option value="admin">🔐 Administração</option>
          </select>
        </div>

        <!-- 2. Seletor de ministério (só aparece para admin) -->
        <div id="wrap-ministerio-admin">
          <label>Ministério</label>
          <select id="select-ministerio-admin" class="input-estilo">
            <option value="">— Selecione o ministério —</option>
            <option value="louvor">🎵 Louvor</option>
            <option value="midia">📷 Mídia</option>
            <option value="infantil">🧒 Infantil</option>
          </select>
        </div>

        <!-- 3. Senha -->
        <div>
          <label id="label-senha" for="input-senha">Senha de Acesso</label>
          <input
            type="password"
            id="input-senha"
            class="input-estilo"
            placeholder="Digite a senha"
            autocomplete="current-password"
          />
        </div>

        <button class="btn-entrar" onclick="tentarLogin()">Entrar</button>
        <p class="login-erro" id="login-erro" style="display: none;"></p>
      </div>
    </div>
  </div>

  <!-- ─── TELA DO APP ───────────────────────── -->
  <div id="tela-app">

    <header class="app-header">
      <!-- Linha 1: título + Sair -->
      <div class="header-row-top">
        <div class="header-esquerda">
          <img src="/src/assets/images/logo.png" alt="Nova Vida Botafogo" class="header-logo" />
        </div>
        <button class="btn-sair" onclick="sair()">Sair</button>
      </div>
      <!-- Linha 2: filtros de ministério + Sair (mobile) -->
      <div class="header-row-bottom">
        <div id="seletor-ministerio"></div>
        <button class="btn-sair" onclick="sair()">Sair</button>
      </div>
    </header>

    <nav class="app-nav">
      <button class="nav-btn ativo" data-aba="escala" onclick="ativarAba('escala')">📅 Escala</button>
      <button class="nav-btn" data-aba="materiais" onclick="ativarAba('materiais')">📂 Materiais</button>
    </nav>

    <main class="app-conteudo">

      <!-- ESCALA -->
      <section id="secao-escala" class="secao ativa">
        <h2 class="secao-titulo">Escala do Ministério</h2>

        <div class="escala-controles">
          <div>
            <label>Filtrar Culto</label>
            <select id="filtro-data" onchange="aplicarFiltrosVisual()">
              <option value="">Todos os cultos</option>
            </select>
          </div>
          <div>
            <label>Filtrar Função</label>
            <select id="filtro-funcao" onchange="aplicarFiltrosVisual()">
              <option value="">Todas as funções</option>
            </select>
          </div>
          <div>
            <label>Buscar Nome</label>
            <input
              type="text"
              id="filtro-nome"
              placeholder="Ex: Matheus..."
              oninput="aplicarFiltrosVisual()"
            />
          </div>
        </div>

        <div class="tabela-wrapper">
          <div id="badge-mes-atual">📆 <span id="mes-atual-texto"></span></div>
          <table class="tabela-escala">
            <thead>
              <tr>
                <th style="width: 40px;"></th>
                <th>Função</th>
                <th>Nome</th>
              </tr>
            </thead>
            <tbody id="escala-tbody"></tbody>
          </table>
        </div>

        <hr class="divider" />
        <p style="font-size: 0.78rem; color: var(--cor-texto-suave);">
          ⚠️ Em caso de impossibilidade, comunique o seu líder com antecedência.
        </p>
      </section>

      <!-- MATERIAIS -->
      <section id="secao-materiais" class="secao">
        <h2 class="secao-titulo">Materiais</h2>
        <div class="drive-grid" id="drive-grid"></div>
      </section>

    </main>

    <footer class="app-footer">
      Igreja Nova Vida de Botafogo &nbsp;|&nbsp; <span>invbotafogo.com.br</span>
    </footer>

  </div>

  <!-- Botão flutuante de download PNG -->
  <button id="btn-download-escala" onclick="baixarEscalaPNG()">
    ⬇ Baixar Escala
  </button>

  <script src="/src/js/loumi.js"></script>
</body>
</html>
