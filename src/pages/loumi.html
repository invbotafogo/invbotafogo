<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Área Interna — INVB</title>
  <meta name="robots" content="noindex, nofollow" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- <link rel="stylesheet" href="../css/loumi.css" /> -->

  <style>
    /* =============================================
   LOUMI.CSS — Área Interna INVB
   ============================================= */

@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap');

/* ─── VARIÁVEIS ─── */
:root {
  --cor-fundo:          #0d0d0d;
  --cor-fundo-card:     #1a1a1a;
  --cor-fundo-card2:    #222222;
  --cor-primaria:       #b8973a;
  --cor-primaria-hover: #d4af52;
  --cor-texto:          #e8e8e8;
  --cor-texto-suave:    #aaaaaa;
  --cor-borda:          #333333;
  --cor-destaque:       #8b0000;
  --cor-sucesso:        #2e7d32;
  --cor-erro:           #c62828;
  --radius:             8px;
  --sombra:             0 4px 20px rgba(0,0,0,0.5);
}

/* ─── RESET ─── */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Lato', sans-serif;
  background-color: var(--cor-fundo);
  color: var(--cor-texto);
  min-height: 100vh;
  line-height: 1.6;
}

/* ══════════════════════════════════════════════
   LOGIN
══════════════════════════════════════════════ */
#tela-login {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  background: radial-gradient(ellipse at top, #1a1200 0%, #0d0d0d 60%);
}

.login-box {
  background: var(--cor-fundo-card);
  border: 1px solid var(--cor-primaria);
  border-radius: var(--radius);
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--sombra), 0 0 40px rgba(184,151,58,0.08);
  text-align: center;
}

.login-logo {
  display: flex;
  justify-content: center;
}

.login-titulo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--cor-primaria);
  margin-bottom: 4px;
  letter-spacing: 1px;
}

.login-subtitulo {
  font-size: 0.85rem;
  color: var(--cor-texto-suave);
  margin-bottom: 32px;
}

.login-form {
  display: flex;
  flex-direction: column;
  gap: 14px;
  text-align: left;
}

.login-form label {
  display: block;
  font-size: 0.78rem;
  color: var(--cor-texto-suave);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.login-form select,
.login-form input[type="password"] {
  width: 100%;
  padding: 12px 14px;
  background: #111;
  border: 1px solid var(--cor-borda);
  border-radius: var(--radius);
  color: var(--cor-texto);
  font-family: 'Lato', sans-serif;
  font-size: 0.95rem;
  transition: border-color 0.2s;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
}

.login-form select:focus,
.login-form input[type="password"]:focus {
  border-color: var(--cor-primaria);
}

.login-form select option {
  background: #111;
}

.login-erro {
  color: var(--cor-erro);
  font-size: 0.85rem;
  margin-top: 4px;
}

/* Seletor de ministério admin — animação suave */
#wrap-ministerio-admin {
  display: none;
  animation: fadeIn 0.2s ease;
}

/* ══════════════════════════════════════════════
   BOTÕES GLOBAIS
══════════════════════════════════════════════ */
.btn-entrar {
  width: 100%;
  padding: 13px;
  background: var(--cor-primaria);
  color: #0d0d0d;
  border: none;
  border-radius: var(--radius);
  font-family: 'Cinzel', serif;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}

.btn-entrar:hover  { background: var(--cor-primaria-hover); transform: translateY(-1px); }
.btn-entrar:active { transform: translateY(0); }

.btn-sair {
  background: transparent;
  border: 1px solid #444;
  color: var(--cor-texto-suave);
  padding: 6px 14px;
  border-radius: var(--radius);
  font-family: 'Lato', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  white-space: nowrap;
}

.btn-sair:hover {
  border-color: var(--cor-primaria);
  color: var(--cor-primaria);
}

/* ══════════════════════════════════════════════
   APP PRINCIPAL
══════════════════════════════════════════════ */
#tela-app {
  display: none;
  flex-direction: column;
  min-height: 100vh;
}

/* ─── HEADER ─── */
.app-header {
  background: #000;
  padding: 10px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.6);
}

.header-esquerda {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

.header-logo {
  max-height: 65px;
  width: auto;
  object-fit: contain;
  display: block;
}

.header-titulo {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  color: var(--cor-primaria);
  line-height: 1.2;
}

.header-subtitulo {
  font-size: 0.7rem;
  color: var(--cor-texto-suave);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.header-row-bottom .btn-sair { display: none; }

.header-row-top {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-row-bottom {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-row-bottom #seletor-ministerio {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

/* ─── SELETOR DE MINISTÉRIO (header) ─── */
#seletor-ministerio {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}

.btn-ministerio {
  padding: 5px 11px;
  background: transparent;
  color: var(--cor-texto-suave);
  border: 1px solid var(--cor-borda);
  border-radius: 6px;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-ministerio.ativo {
  background: var(--cor-primaria);
  color: #111;
  border-color: var(--cor-primaria);
  font-weight: 700;
}

/* ─── NAVEGAÇÃO ABAS ─── */
.app-nav {
  background: #161616;
  border-top: 2px solid var(--cor-primaria);
  padding: 0 24px;
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}

.app-nav::-webkit-scrollbar { display: none; }

.nav-btn {
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  color: var(--cor-texto-suave);
  padding: 14px 18px;
  font-family: 'Lato', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
}

.nav-btn:hover { color: var(--cor-primaria); }
.nav-btn.ativo {
  color: var(--cor-primaria);
  border-bottom-color: var(--cor-primaria);
}

/* ─── CONTEÚDO PRINCIPAL ─── */
.app-conteudo {
  flex: 1;
  padding: 32px 24px;
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
}

.secao       { display: none; }
.secao.ativa { display: block; }

/* ─── TÍTULOS DE SEÇÃO ─── */
.secao-titulo {
  font-family: 'Cinzel', serif;
  font-size: 1.3rem;
  color: var(--cor-primaria);
  margin-bottom: 6px;
}

.secao-desc {
  font-size: 0.88rem;
  color: var(--cor-texto-suave);
  margin-bottom: 24px;
}

.divider {
  border: none;
  border-top: 1px solid var(--cor-borda);
  margin: 24px 0;
}

/* ══════════════════════════════════════════════
   ESCALA — CONTROLES DE FILTRO
══════════════════════════════════════════════ */
.escala-controles {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  background: var(--cor-fundo-card);
  padding: 14px;
  border-radius: var(--radius);
  margin-bottom: 20px;
  border: 1px solid var(--cor-borda);
}

.escala-controles label {
  display: block;
  font-size: 0.72rem;
  color: var(--cor-texto-suave);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.escala-controles select,
.escala-controles input {
  width: 100%;
  height: 42px;
  background: var(--cor-fundo-card2) !important;
  color: white !important;
  border: 1px solid #444;
  border-radius: 6px;
  padding: 0 10px;
  outline: none;
  font-family: 'Lato', sans-serif;
  font-size: 0.88rem;
  appearance: none;
  -webkit-appearance: none;
  box-sizing: border-box;
}

.escala-controles select:focus,
.escala-controles input:focus {
  border-color: var(--cor-primaria);
}

/* ─── BADGE DE MÊS ─── */
#badge-mes-atual {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,215,0,0.08);
  border: 1px solid rgba(255,215,0,0.25);
  color: #ffd700;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 20px;
  margin-bottom: 14px;
  letter-spacing: 0.4px;
}

/* ─── TABELA DE ESCALA ─── */
.tabela-wrapper {
  overflow-x: auto;
  border-radius: var(--radius);
  border: 1px solid var(--cor-borda);
  box-shadow: var(--sombra);
  -webkit-overflow-scrolling: touch;
}

.tabela-escala {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
}

.tabela-escala thead {
  background: #1e1600;
}

.tabela-escala thead th {
  padding: 13px 16px;
  text-align: left;
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  color: var(--cor-primaria);
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 2px solid var(--cor-primaria);
  white-space: nowrap;
}

.tabela-escala tbody tr {
  border-bottom: 1px solid #252525;
  transition: background 0.15s;
}

.tabela-escala tbody tr:hover  { background: var(--cor-fundo-card2); }
.tabela-escala tbody tr:last-child { border-bottom: none; }

.tabela-escala tbody td {
  padding: 12px 16px;
  color: var(--cor-texto);
  vertical-align: middle;
}

.tabela-escala tbody td:first-child {
  font-weight: 700;
  color: var(--cor-primaria);
  white-space: nowrap;
}

/* ─── TAGS ─── */
.tag-funcao {
  display: inline-block;
  background: #1e1600;
  border: 1px solid var(--cor-primaria);
  color: var(--cor-primaria);
  font-size: 0.7rem;
  padding: 2px 10px;
  border-radius: 20px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.tag-funcao.midia {
  background: #0d1a2e;
  border-color: #4a90d9;
  color: #4a90d9;
}

.tag-ministerio {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.tag-louvor   { background: rgba(255,215,0,0.15);   color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
.tag-midia    { background: rgba(100,180,255,0.15); color: #64b4ff; border: 1px solid rgba(100,180,255,0.3); }
.tag-infantil { background: rgba(120,220,120,0.15); color: #78dc78; border: 1px solid rgba(120,220,120,0.3); }

/* ─── BOTÃO DOWNLOAD FLUTUANTE ─── */
#btn-download-escala {
  display: none;
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 100;
  align-items: center;
  gap: 8px;
  background: #ffd700;
  color: #111;
  font-weight: 700;
  font-size: 0.85rem;
  border: none;
  border-radius: 50px;
  padding: 13px 22px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(255,215,0,0.35);
  transition: transform 0.15s, box-shadow 0.15s;
  letter-spacing: 0.3px;
}

#btn-download-escala:hover  { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(255,215,0,0.5); }
#btn-download-escala:active { transform: scale(0.97); }

/* ══════════════════════════════════════════════
   MATERIAIS / DRIVE
══════════════════════════════════════════════ */
.drive-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 18px;
  margin-bottom: 32px;
}

.drive-card {
  background: var(--cor-fundo-card);
  border: 1px solid var(--cor-borda);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
  box-shadow: var(--sombra);
}

.drive-card:hover {
  border-color: var(--cor-primaria);
  transform: translateY(-2px);
}

.drive-card-header {
  background: #1e1600;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #2a2000;
}

.drive-card-icone  { font-size: 1.4rem; }
.drive-card-titulo { font-family: 'Cinzel', serif; font-size: 0.9rem; color: var(--cor-primaria); font-weight: 600; }
.drive-card-tipo   { font-size: 0.7rem; color: var(--cor-texto-suave); }

.drive-card-body { padding: 14px 18px; }

.drive-card-desc {
  font-size: 0.83rem;
  color: var(--cor-texto-suave);
  margin-bottom: 14px;
  line-height: 1.5;
}

.btn-abrir-drive {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  background: var(--cor-primaria);
  color: #0d0d0d;
  border: none;
  border-radius: var(--radius);
  padding: 9px 16px;
  font-family: 'Lato', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.2s;
}

.btn-abrir-drive:hover        { background: var(--cor-primaria-hover); }
.btn-abrir-drive.midia        { background: #1a3a5c; color: #e0e8f0; }
.btn-abrir-drive.midia:hover  { background: #1e4a7a; }

/* ══════════════════════════════════════════════
   FOOTER
══════════════════════════════════════════════ */
.app-footer {
  background: #111;
  border-top: 1px solid var(--cor-borda);
  padding: 14px 24px;
  text-align: center;
  font-size: 0.75rem;
  color: #444;
}

.app-footer span { color: var(--cor-primaria); }

/* ══════════════════════════════════════════════
   ANIMAÇÕES
══════════════════════════════════════════════ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════════════════════════
   RESPONSIVO — TABLET (≤ 900px)
══════════════════════════════════════════════ */
@media (max-width: 900px) {
  .escala-controles {
    grid-template-columns: 1fr 1fr;
  }
}

/* ══════════════════════════════════════════════
   RESPONSIVO — MOBILE (≤ 640px)
══════════════════════════════════════════════ */
@media (max-width: 640px) {
  .app-header {
    flex-direction: column;
    align-items: stretch;
    padding: 14px 14px 12px;
    gap: 0;
  }

  .header-row-top {
    display: flex;
    align-items: center;
    justify-content: center;
    padding-bottom: 12px;
  }

  .header-row-top .btn-sair { display: none; }

  .header-logo { height: 38px; }

  .header-row-bottom {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    border-top: 1px solid #252525;
    padding-top: 10px;
  }

  #seletor-ministerio {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    scrollbar-width: none;
    gap: 6px;
    -webkit-overflow-scrolling: touch;
  }

  #seletor-ministerio::-webkit-scrollbar { display: none; }

  .header-row-bottom .btn-sair {
    display: flex;
    flex-shrink: 0;
    font-size: 0.72rem;
    padding: 5px 10px;
  }

  .btn-ministerio {
    flex-shrink: 0;
    font-size: 0.75rem;
    padding: 5px 12px;
  }

  .app-nav  { padding: 0 10px; margin-top: 5vh; }
  .nav-btn  { padding: 12px 14px; font-size: 0.8rem; }

  .app-conteudo { padding: 18px 14px; }

  .escala-controles {
    grid-template-columns: 1fr;
    padding: 12px;
    gap: 10px;
  }

  .tabela-escala thead th,
  .tabela-escala tbody td {
    padding: 10px 12px;
    font-size: 0.83rem;
  }

  .login-box    { padding: 32px 20px; }
  .login-titulo { font-size: 1.2rem; }

  #btn-download-escala {
    bottom: 16px;
    right: 14px;
    font-size: 0.78rem;
    padding: 11px 16px;
  }

  .drive-grid { grid-template-columns: 1fr; }
}

/* ══════════════════════════════════════════════
   RESPONSIVO — MOBILE PEQUENO (≤ 380px)
══════════════════════════════════════════════ */
@media (max-width: 380px) {
  .login-box  { padding: 28px 16px; }
  .btn-entrar { font-size: 0.88rem; }

  .tabela-escala thead th:first-child,
  .tabela-escala tbody td:first-child {
    display: none;
  }
}

@media (max-width: 320px) {
  .app-nav {
    margin-top: 10vh;
  }
}
  </style>
</head>


<body>

  <!-- ─── TELA DE LOGIN ─────────────────────── -->
  <div id="tela-login">
    <div class="login-box">
      <div class="login-logo">
        <img src="../assets/images/logo.png" alt="Nova Vida Botafogo" class="login-logo-img" />
      </div>
      <p class="login-subtitulo">Área Interna</p>

      <div class="login-form">

        <!-- 1. Tipo de acesso -->
        <div>
          <label>Acesso</label>
          <select id="select-acesso" class="input-estilo" onchange="onAcessoChange()">
            <option value="">— Selecione —</option>
            <option value="escala">📅 Ver Escala</option>
            <option value="admin">🔐 Administração</option>
          </select>
        </div>

        <!-- 2. Seletor de ministério (só aparece para admin) -->
        <div id="wrap-ministerio-admin">
          <label>Ministério</label>
          <select id="select-ministerio-admin" class="input-estilo">
            <option value="">— Selecione o ministério —</option>
            <option value="louvor">🎵 Louvor</option>
            <option value="midia">📷 Mídia</option>
            <option value="infantil">🧒 Infantil</option>
          </select>
        </div>

        <!-- 3. Senha -->
        <div>
          <label id="label-senha" for="input-senha">Senha de Acesso</label>
          <input
            type="password"
            id="input-senha"
            class="input-estilo"
            placeholder="Digite a senha"
            autocomplete="current-password"
          />
        </div>

        <button class="btn-entrar" onclick="tentarLogin()">Entrar</button>
        <p class="login-erro" id="login-erro" style="display: none;"></p>
      </div>
    </div>
  </div>

  <!-- ─── TELA DO APP ───────────────────────── -->
  <div id="tela-app">

    <header class="app-header">
      <!-- Linha 1: título + Sair -->
      <div class="header-row-top">
        <div class="header-esquerda">
          <img src="../assets/images/logo.png" alt="Nova Vida Botafogo" class="header-logo" />
        </div>
        <button class="btn-sair" onclick="sair()">Sair</button>
      </div>
      <!-- Linha 2: filtros de ministério + Sair (mobile) -->
      <div class="header-row-bottom">
        <div id="seletor-ministerio"></div>
        <button class="btn-sair" onclick="sair()">Sair</button>
      </div>
    </header>

    <nav class="app-nav">
      <button class="nav-btn ativo" data-aba="escala" onclick="ativarAba('escala')">📅 Escala</button>
      <button class="nav-btn" data-aba="materiais" onclick="ativarAba('materiais')">📂 Materiais</button>
    </nav>

    <main class="app-conteudo">

      <!-- ESCALA -->
      <section id="secao-escala" class="secao ativa">
        <h2 class="secao-titulo">Escala do Ministério</h2>

        <div class="escala-controles">
          <div>
            <label>Filtrar Culto</label>
            <select id="filtro-data" onchange="aplicarFiltrosVisual()">
              <option value="">Todos os cultos</option>
            </select>
          </div>

            <label>Filtrar Função</label>

      // ─── FILTROS VISUAIS & RENDERIZAÇÃO ──────────

          const filtroNomeVal   = document.getElementById('filtro-nome')?.value.trim().toLowerCase() || '';
          const filtroFuncaoVal = document.getElementById('filtro-funcao')?.value || '';
          const tbody           = document.getElementById('escala-tbody');
          const mostrandoVarios = selecionadosArray().length > 1;

          const filtrados = escalasCarregadas.filter(item => {
              const passaData   = !filtroDataVal   || item.data   === filtroDataVal;
              const passaNome   = !filtroNomeVal   || item.nome.toLowerCase().includes(filtroNomeVal);
              const passaFuncao = !filtroFuncaoVal || item.funcao === filtroFuncaoVal;
              return passaData && passaNome && passaFuncao;
          });

          const thead = document.querySelector('.tabela-escala thead tr');
          if (thead) {
              thead.innerHTML = mostrandoVarios
                  ? '<th style="width:40px;"></th><th>Função</th><th>Nome</th><th>Ministério</th>'
                  : '<th style="width:40px;"></th><th>Função</th><th>Nome</th>';
          }

          // Botão de download — aparece só se tem resultados
          const btnDownload = document.getElementById('btn-download-escala');
          if (btnDownload) btnDownload.style.display = filtrados.length > 0 ? 'flex' : 'none';

          if (filtrados.length === 0) {
              const colspan = mostrandoVarios ? 4 : 3;
              tbody.innerHTML = `<tr><td colspan="${colspan}" style="text-align:center; padding: 32px; opacity:0.5;">Nenhuma escala encontrada.</td></tr>`;
              return;
          }

          let html      = "";
          let ultimaData = "";

          filtrados.forEach(item => {
              if (item.data !== ultimaData) {
                  const colspan = mostrandoVarios ? 4 : 3;
                  html += `
                      <tr class="linha-separadora">
                          <td colspan="${colspan}" style="background: #1a1a1a; color: #ffd700; font-weight: bold; padding: 12px; border-left: 4px solid #ffd700; border-top: 10px solid #121212;">
                              🗓️ ${item.data} - ${item.culto}
                          </td>
                      </tr>`;
                  ultimaData = item.data;
              }

              const colunaMinisterio = mostrandoVarios
                  ? `<td style="padding: 14px 8px;"><span class="tag-ministerio tag-${item.ministerio}">${CONFIG.ministerios[item.ministerio]?.nome ?? item.ministerio}</span></td>`
                  : '';

              html += `
                  <tr>
                      <td style="width: 40px; opacity: 0.3; text-align: center; font-size: 0.6rem;">●</td>
                      <td style="padding: 14px 8px;"><span class="tag-funcao">${item.funcao}</span></td>
                      <td><strong>${item.nome}</strong></td>
                      ${colunaMinisterio}
                  </tr>
              `;
          });

          tbody.innerHTML = html;
      }

      // ─── DOWNLOAD PNG DA ESCALA (Canvas nativo) ───
      async function baixarEscalaPNG() {
          const filtroDataVal   = document.getElementById('filtro-data')?.value || '';
          const filtroNomeVal   = document.getElementById('filtro-nome')?.value.trim().toLowerCase() || '';
          const filtroFuncaoVal = document.getElementById('filtro-funcao')?.value || '';
          const mostrandoVarios = selecionadosArray().length > 1;

          const filtrados = escalasCarregadas.filter(item => {
              const passaData   = !filtroDataVal   || item.data   === filtroDataVal;
              const passaNome   = !filtroNomeVal   || item.nome.toLowerCase().includes(filtroNomeVal);
              const passaFuncao = !filtroFuncaoVal || item.funcao === filtroFuncaoVal;
              return passaData && passaNome && passaFuncao;
          });

          if (filtrados.length === 0) return;

          // Título do filtro ativo
          const partesFiltro = [];
          if (!mostrandoVarios) partesFiltro.push(CONFIG.ministerios[selecionadosArray()[0]]?.nome || '');
          if (filtroFuncaoVal) partesFiltro.push(filtroFuncaoVal);
          if (filtroNomeVal)   partesFiltro.push(filtroNomeVal);
          if (filtroDataVal)   partesFiltro.push(filtroDataVal);
          const subtitulo = partesFiltro.length ? partesFiltro.join(' · ') : 'Escala Completa';

          // Agrupa por data/culto
          const grupos = {};
          filtrados.forEach(item => {
              const chave = `${item.data}  •  ${item.culto}`;
              if (!grupos[chave]) grupos[chave] = [];
              grupos[chave].push(item);
          });

          const corMin = { louvor: '#ffd700', midia: '#64b4ff', infantil: '#78dc78' };

          // ── Dimensões e constantes ──
          const DPR     = 2;           // resolução 2x
          const W       = 420;         // largura lógica em px
          const PAD     = 24;
          const FONT    = 'system-ui, -apple-system, Arial, sans-serif';

          // ── Pré-calcular altura total ──
          const ROW_H      = 44;
          const GROUP_HEAD = 38;
          const GROUP_GAP  = 12;
          const HEADER_H   = 70;
          const FOOTER_H   = 40;
          const DIVIDER    = 1;

          let totalH = PAD + HEADER_H + 16; // topo + header + espaço
          Object.values(grupos).forEach(itens => {
              totalH += GROUP_HEAD + itens.length * ROW_H + DIVIDER + GROUP_GAP;
          });
          totalH += FOOTER_H + PAD;

          // ── Cria canvas ──
          const canvas  = document.createElement('canvas');
          canvas.width  = W * DPR;
          canvas.height = totalH * DPR;
          const ctx     = canvas.getContext('2d');
          ctx.scale(DPR, DPR);

          // ── Helpers ──
          const rect = (x, y, w, h, color) => { ctx.fillStyle = color; ctx.fillRect(x, y, w, h); };
          const roundRect = (x, y, w, h, r, color) => {
              ctx.fillStyle = color;
              ctx.beginPath();
              ctx.roundRect(x, y, w, h, r);
              ctx.fill();
          };
          const text = (str, x, y, color, size, weight = 'normal', align = 'left') => {
              ctx.fillStyle = color;
              ctx.font = `${weight} ${size}px ${FONT}`;
              ctx.textAlign = align;
              ctx.fillText(str, x, y);
          };

          // ── Fundo ──
          roundRect(0, 0, W, totalH, 12, '#161616');

          // ── Borda sutil ──
          ctx.strokeStyle = '#2a2a2a';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.roundRect(0.5, 0.5, W - 1, totalH - 1, 12);
          ctx.stroke();

          // ── Header ──
          let y = PAD;

          // Logo INVB
          roundRect(PAD, y, 52, 36, 8, '#ffd700');
          text('INVB', PAD + 26, y + 24, '#111111', 13, '800', 'center');

          // Título
          text('Escala do Ministério', PAD + 64, y + 14, '#ffffff', 14, '700');
          text(subtitulo, PAD + 64, y + 30, '#888888', 11, 'normal');

          y += HEADER_H;

          // Linha divisória
          rect(PAD, y, W - PAD * 2, 1, '#2a2a2a');
          y += 16;

          // ── Grupos ──
          Object.entries(grupos).forEach(([titulo, itens]) => {
              // Cabeçalho do grupo
              rect(PAD, y, 3, GROUP_HEAD, '#ffd700');                       // barra lateral
              roundRect(PAD + 3, y, W - PAD * 2 - 3, GROUP_HEAD, [0,4,0,0], '#1e1e1e'); // fundo
              text(titulo, PAD + 16, y + GROUP_HEAD / 2 + 5, '#ffd700', 11, '700');
              y += GROUP_HEAD;

              // Linhas de cada pessoa
              itens.forEach((item, idx) => {
                  const rowBg = idx % 2 === 0 ? '#1a1a1a' : '#191919';
                  rect(PAD + 3, y, W - PAD * 2 - 3, ROW_H, rowBg);

                  const cor = mostrandoVarios ? (corMin[item.ministerio] || '#ffd700') : '#ffd700';

                  // Ponto colorido
                  ctx.fillStyle = cor;
                  ctx.globalAlpha = 0.6;
                  ctx.beginPath();
                  ctx.arc(PAD + 18, y + ROW_H / 2, 3, 0, Math.PI * 2);
                  ctx.fill();
                  ctx.globalAlpha = 1;

                  // Função
                  text(item.funcao, PAD + 30, y + ROW_H / 2 + 4, '#999999', 10.5);

                  // Nome (direita)
                  const nomeX = mostrandoVarios ? W - PAD - 70 : W - PAD - 12;
                  text(item.nome, nomeX, y + ROW_H / 2 + 4, '#ffffff', 12, '600', 'right');

                  // Tag de ministério (só quando mostrando vários)
                  if (mostrandoVarios) {
                      const nomeMin = CONFIG.ministerios[item.ministerio]?.nome ?? item.ministerio;
                      const tagW = 58, tagH = 18, tagX = W - PAD - 60, tagY = y + ROW_H / 2 - 9;
                      ctx.fillStyle = cor + '22';
                      ctx.strokeStyle = cor + '66';
                      ctx.lineWidth = 1;
                      ctx.beginPath();
                      ctx.roundRect(tagX, tagY, tagW, tagH, 4);
                      ctx.fill();
                      ctx.stroke();
                      text(nomeMin.toUpperCase(), tagX + tagW / 2, tagY + 12, cor, 8, '700', 'center');
                  }

                  y += ROW_H;
              });

              // Linha separadora embaixo do grupo
              rect(PAD + 3, y, W - PAD * 2 - 3, DIVIDER, '#252525');
              y += DIVIDER + GROUP_GAP;
          });

          // ── Rodapé ──
          y = totalH - FOOTER_H;
          rect(PAD, y, W - PAD * 2, 1, '#2a2a2a');
          text(
              `invbotafogo.com.br  ·  gerado em ${new Date().toLocaleDateString('pt-BR')}`,
              W / 2, y + 24, '#444444', 10, 'normal', 'center'
          );

          // ── Download ──
          const link = document.createElement('a');
          link.download = `escala-invb-${subtitulo.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase()}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
      }

      // ─── MATERIAIS ───────────────────────────────
      function renderizarMateriais() {
          const grid = document.getElementById('drive-grid');
          if (!grid) return;

          const materiais = selecionadosArray().flatMap(k => CONFIG.materiais[k] || []);

          if (materiais.length === 0) {
              grid.innerHTML = '<p style="opacity:0.5; padding:20px;">Nenhum material disponível.</p>';
              return;
          }

          grid.innerHTML = materiais.map(mat => `
              <div class="drive-card">
                <div class="drive-card-header">
                  <span class="drive-card-icone">${mat.icone}</span>
                  <div>
                    <div class="drive-card-titulo">${mat.titulo}</div>
                    <div class="drive-card-tipo">${mat.tipo}</div>
                  </div>
                </div>
                <div class="drive-card-body">
                  <p class="drive-card-desc">${mat.descricao}</p>
                  <a class="btn-abrir-drive" href="https://drive.google.com/drive/folders/${mat.driveId}" target="_blank" style="text-decoration:none; display:block; text-align:center;">↗ Abrir no Drive</a>
                </div>
              </div>
          `).join('');
      }

      function ativarAba(aba) {

          document.querySelectorAll('.secao').forEach(s => s.classList.toggle('ativa', s.id === 'secao-' + aba));

      // ─── EXPORTS ─────────────────────────────────
      window.tentarLogin          = tentarLogin;
      window.onAcessoChange       = onAcessoChange;
      window.renderizarEscala     = renderizarEscala;
      window.aplicarFiltrosVisual = aplicarFiltrosVisual;
      window.ativarAba            = ativarAba;
      window.toggleMinisterio     = toggleMinisterio;
      window.selecionarTodos      = selecionarTodos;
      window.sair                 = sair;
      window.baixarEscalaPNG      = baixarEscalaPNG;

      document.getElementById('input-senha')?.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') tentarLogin();
      });
  </script>
</body>
